name: Epistemic Code Review

on:
  pull_request:
    types: [opened]
    paths:
      - 'prothesis/**'
      - 'syneidesis/**'
      - 'hermeneia/**'
      - 'katalepsis/**'
      - 'telos/**'
      - 'horismos/**'
      - 'aitesis/**'
      - 'analogia/**'
      - 'prosoche/**'
      - 'epharmoge/**'

jobs:
  epistemic-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get changed files
        id: changed
        run: |
          gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path' > /tmp/changed-files.txt
          if [ ! -s /tmp/changed-files.txt ]; then
            echo "::error::No changed files found for PR #${{ github.event.pull_request.number }}"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Epistemic Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |-
            Perform a multi-perspective code review and gap analysis of this PR.
            Review ONLY the changed files — read /tmp/changed-files.txt for the list.

            The full diff is available at /tmp/pr-diff.txt. Read it to understand the exact changes.

            ## Perspective Analysis

            Analyze the changes from each perspective:
            1. **Category Theory** — morphism coherence, composition laws, functor consistency
            2. **Type Theory** — type signature soundness, variance, type safety
            3. **Operational Semantics** — evaluation order, phase transitions, state consistency

            For each finding:
            - Reference specific file path and line number from the diff
            - Severity: Critical / Important / Suggestion
            - Evidence-grounded rationale (reference actual changed code)
            - Only report findings with confidence >= 80%

            ## Gap Scanning

            Scan decision points in the diff for unnoticed gaps:
            - **Procedural**: missing steps or incomplete workflows
            - **Consideration**: unaddressed trade-offs
            - **Assumption**: implicit assumptions needing explicit statement
            - **Alternative**: unexplored approaches

            ## Output

            For each finding, clearly state:
            - File path and line number
            - Tag: [Category Theory], [Type Theory], [OpSem], or [Gap: Type]
            - Severity and evidence-grounded rationale

            If the changes are trivial (e.g., version bumps only), state that explicitly and keep the review brief.

          plugin_marketplaces: 'https://github.com/jongwony/epistemic-protocols.git'
          plugins: |
            prothesis@epistemic-protocols
            syneidesis@epistemic-protocols

      - name: Extract review text
        if: always() && steps.review.outputs.execution_file != ''
        id: extract
        run: |
          jq -r '
            [.[] | select(.type == "assistant") | .message.content[]
             | select(.type == "text") | .text] | join("\n\n---\n\n")
          ' "${{ steps.review.outputs.execution_file }}" > /tmp/review-output.txt

          if [ ! -s /tmp/review-output.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comments
        if: >-
          always()
          && steps.extract.outcome == 'success'
          && steps.extract.outputs.skip != 'true'
          && steps.review.outputs.execution_file != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-haiku-4-5 --max-turns 10'
          settings: '{"permissions":{"allow":["Bash(gh api:*)","Bash(cat:*)","Read","Write"]}}'

          prompt: |-
            You are a review comment posting agent. Read /tmp/review-output.txt which contains
            an epistemic code review of PR #${{ github.event.pull_request.number }}.

            For each review finding that references a specific file path and line number,
            post it as an inline PR review comment using:

            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              --field body="<comment body>" \
              --field path="<file path>" \
              --field commit_id="${{ github.event.pull_request.head.sha }}" \
              --field line=<line number>

            Rules:
            - Only post findings with specific file paths and line numbers
            - Preserve tags: [Category Theory], [Type Theory], [OpSem], [Gap: Type]
            - Preserve severity: Critical / Important / Suggestion
            - Skip duplicate or near-duplicate findings
            - After posting inline comments, post a summary comment on the PR:
              gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
                --field body="<overview summary>"
