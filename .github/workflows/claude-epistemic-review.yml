name: Epistemic Code Review

on:
  workflow_dispatch:
  pull_request:
    types: [opened]
    paths:
      - 'prothesis/**'
      - 'syneidesis/**'
      - 'katalepsis/**'
      - 'horismos/**'
      - 'aitesis/**'
      - 'analogia/**'
      - 'prosoche/**'
      - 'epharmoge/**'
      - 'periagoge/**'
      - 'euporia/**'
      - 'anamnesis/**'

jobs:
  epistemic-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            PR_JSON=$(gh pr view --json number,headRefOid)
            echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "sha=$(echo "$PR_JSON" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get changed files
        id: changed
        run: |
          FILES=$(gh pr view ${{ steps.pr.outputs.number }} --json files --jq '.files[].path')
          if [ -z "$FILES" ]; then
            echo "::error::No changed files found for PR #${{ steps.pr.outputs.number }}"
            exit 1
          fi
          echo "files<<CHANGED_FILES_EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "CHANGED_FILES_EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get file status map
        id: filestatus
        run: |
          BASE_SHA=$(gh pr view ${{ steps.pr.outputs.number }} --json baseRefOid --jq '.baseRefOid')
          git diff --name-status "$BASE_SHA"...HEAD > .pr-name-status.txt
          echo "::group::File status map"
          cat .pr-name-status.txt
          echo "::endgroup::"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get PR diff
        run: |
          gh pr diff ${{ steps.pr.outputs.number }} > .pr-diff.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Epistemic Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |-
            Perform a multi-perspective code review and gap analysis of this PR.
            Review ONLY the following changed files:
            ${{ steps.changed.outputs.files }}

            ## File fate (authoritative)

            Read `.pr-name-status.txt` for the per-file fate map produced by `git diff --name-status base...HEAD`:
            - `A <path>` — Added: the file is created by this PR; it does NOT exist on the base branch
            - `M <path>` — Modified: the file exists on both base and head; the diff shows the line-level changes
            - `D <path>` — Deleted: the file exists on the base branch and is removed by this PR
            - `R<score> <old> <new>` — Renamed (old path replaced by new path)
            Treat this map as the authoritative source for file fate. Files marked `A` were created by this PR; files marked `D` were removed by this PR.

            ## Diff reading

            The full unified diff is available at `.pr-diff.txt`. The diff records the transition from base branch to PR head:
            - Lines starting with `+` are added by this PR
            - Lines starting with `-` are removed by this PR
            - Lines starting with a space are unchanged context
            - For files marked `A` in the status map, the diff begins with `--- /dev/null` and `+++ b/<path>`; the `+` lines are the file's initial content created by this PR
            - For files marked `D` in the status map, the diff begins with `--- a/<path>` and `+++ /dev/null`; the `-` lines are the file's prior content removed by this PR

            ## Perspective Analysis

            Analyze the changes from each perspective:
            1. **Category Theory** — morphism coherence, composition laws, functor consistency
            2. **Type Theory** — type signature soundness, variance, type safety
            3. **Operational Semantics** — evaluation order, phase transitions, state consistency

            For each finding:
            - Reference specific file path and line number from the diff
            - Severity: Critical / Important / Suggestion
            - Evidence-grounded rationale (reference actual changed code)
            - Only report findings with confidence >= 80%

            ## Gap Scanning

            Scan decision points in the diff for unnoticed gaps:
            - **Procedural**: missing steps or incomplete workflows
            - **Consideration**: unaddressed trade-offs
            - **Assumption**: implicit assumptions needing explicit statement
            - **Alternative**: unexplored approaches

            ## Output

            For each finding, clearly state:
            - File path and line number
            - Tag: [Category Theory], [Type Theory], [OpSem], or [Gap: Type]
            - Severity and evidence-grounded rationale

            If the changes are trivial (e.g., version bumps only), state that explicitly and keep the review brief.

          plugin_marketplaces: 'https://github.com/jongwony/epistemic-protocols.git'
          plugins: |
            prothesis@epistemic-protocols
            syneidesis@epistemic-protocols

      - name: Extract review text
        if: always() && steps.review.outputs.execution_file != ''
        id: extract
        run: |
          REVIEW_TEXT=$(jq -r '
            [.[] | select(.type == "assistant") | .message.content[]
             | select(.type == "text") | .text] | join("\n\n---\n\n")
          ' "${{ steps.review.outputs.execution_file }}")

          if [ -z "$REVIEW_TEXT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$REVIEW_TEXT" > .review-text.txt
            echo "review_text<<REVIEW_TEXT_EOF" >> "$GITHUB_OUTPUT"
            echo "$REVIEW_TEXT" >> "$GITHUB_OUTPUT"
            echo "REVIEW_TEXT_EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Cross-check review for direction errors
        if: always() && steps.extract.outcome == 'success' && steps.extract.outputs.skip != 'true'
        id: directioncheck
        run: |
          if [ ! -s .pr-name-status.txt ] || [ ! -s .review-text.txt ]; then
            echo "::warning::Skipping direction cross-check (missing inputs)"
            {
              echo "review_text<<REVIEW_TEXT_EOF"
              cat .review-text.txt 2>/dev/null || true
              echo ""
              echo "REVIEW_TEXT_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ADDED_FILES=$(awk '$1 == "A" {print $2}' .pr-name-status.txt)
          WARNINGS=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if grep -F -- "$f" .review-text.txt 2>/dev/null | grep -qiE 'delet(e|ed|es|ing|ion)'; then
              WARNINGS="${WARNINGS}- \`${f}\` is **Added** in this PR (per .pr-name-status.txt) but the review describes it as deleted\n"
            fi
          done <<< "$ADDED_FILES"

          if [ -n "$WARNINGS" ]; then
            {
              printf '> [!WARNING] **Direction-misread guard fired**\n>\n'
              printf '> The PR diff records the following files as Added but the review describes them as deleted — likely a diff-direction inversion. Verify against `.pr-name-status.txt` before treating these findings as legitimate.\n>\n'
              printf '%b' "$WARNINGS"
              printf '\n---\n\n'
              cat .review-text.txt
            } > .review-text.augmented.txt
            mv .review-text.augmented.txt .review-text.txt
            echo "::warning::Direction-misread guard fired — review augmented with mismatch warning"
          fi

          {
            echo "review_text<<REVIEW_TEXT_EOF"
            cat .review-text.txt
            echo ""
            echo "REVIEW_TEXT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post review comments
        if: >-
          always()
          && steps.extract.outcome == 'success'
          && steps.extract.outputs.skip != 'true'
          && steps.review.outputs.execution_file != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-haiku-4-5 --max-turns 30'
          settings: '{"permissions":{"allow":["Bash"]}}'
          show_full_output: 'true'

          prompt: |-
            You are a review comment posting agent. The following is
            an epistemic code review of PR #${{ steps.pr.outputs.number }}.

            <review>
            ${{ steps.directioncheck.outputs.review_text || steps.extract.outputs.review_text }}
            </review>

            For each review finding that references a specific file path and line number,
            post it as an inline PR review comment. Use jq to construct JSON and pipe via --input -
            to avoid shell escaping issues:

            jq -n --arg body "<comment body>" --arg path "<file path>" \
              --arg commit_id "${{ steps.pr.outputs.sha }}" \
              --argjson line <line number> \
              '{body: $body, path: $path, commit_id: $commit_id, line: $line}' \
            | gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/comments --input -

            Rules:
            - jq output MUST be a JSON object {}, never an array []
            - Only post findings whose line numbers appear in the PR diff
            - If a finding references a line outside the diff, include it in the summary comment instead
            - Preserve tags: [Category Theory], [Type Theory], [OpSem], [Gap: Type]
            - Preserve severity: Critical / Important / Suggestion
            - Skip duplicate or near-duplicate findings
            - Always post a summary comment at the end (even if inline comments were posted):
              jq -n --arg body "<overview summary>" '{body: $body}' \
              | gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments --input -
