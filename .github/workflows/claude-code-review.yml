name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-plugins-official.git'
          plugins: 'pr-review-toolkit@claude-plugins-official'
          prompt: '/pr-review-toolkit:review-pr all'
          show_full_output: true

      - name: Extract review text
        if: always() && steps.review.outputs.execution_file != ''
        id: extract
        run: |
          jq -r '
            [.[] | select(.type == "assistant") | .message.content[]
             | select(.type == "text") | .text] | join("\n\n---\n\n")
          ' "${{ steps.review.outputs.execution_file }}" > /tmp/review-output.txt

          if [ ! -s /tmp/review-output.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comments
        if: always() && steps.extract.outputs.skip != 'true' && steps.review.outputs.execution_file != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-haiku-4-5 --max-turns 10'
          settings: '{"permissions":{"allow":["Bash(gh api:*)","Bash(cat:*)","Read"]}}'
          show_full_output: true
          prompt: |-
            You are a review comment posting agent. Read /tmp/review-output.txt which contains
            a code review of PR #${{ github.event.pull_request.number }}.

            For each review finding that references a specific file path and line number,
            post it as an inline PR review comment using:

            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              --field body="<comment body>" \
              --field path="<file path>" \
              --field commit_id="${{ github.event.pull_request.head.sha }}" \
              --field line=<line number>

            Rules:
            - Only post findings with specific file paths and line numbers
            - Preserve severity tags (Critical / Important / Suggestion)
            - Skip duplicate or near-duplicate findings
            - If no actionable findings exist, post a single summary comment instead using:
              gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
                --field body="<summary>"
