name: Claude Code Review

on:
  workflow_dispatch:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            PR_JSON=$(gh pr view --json number,headRefOid)
            echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "sha=$(echo "$PR_JSON" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get changed files
        id: changed
        run: |
          FILES=$(gh pr view ${{ steps.pr.outputs.number }} --json files --jq '.files[].path')
          if [ -z "$FILES" ]; then
            echo "::error::No changed files found for PR #${{ steps.pr.outputs.number }}"
            exit 1
          fi
          echo "files<<CHANGED_FILES_EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "CHANGED_FILES_EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get PR diff
        run: |
          gh pr diff ${{ steps.pr.outputs.number }} > .pr-diff.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-plugins-official.git'
          plugins: 'pr-review-toolkit@claude-plugins-official'
          prompt: |
            Review ONLY the files changed in this PR.
            Changed files:
            ${{ steps.changed.outputs.files }}

            The full unified diff is available at .pr-diff.txt. Read it to understand the exact changes.
            In unified diff format: lines starting with `+` are ADDITIONS (new code in this PR),
            lines starting with `-` are DELETIONS (code removed by this PR),
            lines starting with a space are unchanged context.
            Base your review strictly on what the diff adds and removes — do not invert the direction.

            Use /pr-review-toolkit:review-pr to review these changed files only.

      - name: Extract review text
        if: always() && steps.review.outputs.execution_file != ''
        id: extract
        run: |
          REVIEW_TEXT=$(jq -r '
            [.[] | select(.type == "assistant") | .message.content[]
             | select(.type == "text") | .text] | join("\n\n---\n\n")
          ' "${{ steps.review.outputs.execution_file }}")

          if [ -z "$REVIEW_TEXT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "review_text<<REVIEW_TEXT_EOF" >> "$GITHUB_OUTPUT"
            echo "$REVIEW_TEXT" >> "$GITHUB_OUTPUT"
            echo "REVIEW_TEXT_EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comments
        if: >-
          always()
          && steps.extract.outcome == 'success'
          && steps.extract.outputs.skip != 'true'
          && steps.review.outputs.execution_file != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-haiku-4-5 --max-turns 15'
          settings: '{"permissions":{"allow":["Bash"]}}'
          show_full_output: 'true'

          prompt: |-
            You are a review comment posting agent. The following is
            a code review of PR #${{ steps.pr.outputs.number }}.

            <review>
            ${{ steps.extract.outputs.review_text }}
            </review>

            For each review finding that references a specific file path and line number,
            post it as an inline PR review comment. Use jq to construct JSON and pipe via --input -
            to avoid shell escaping issues:

            jq -n --arg body "<comment body>" --arg path "<file path>" \
              --arg commit_id "${{ steps.pr.outputs.sha }}" \
              --argjson line <line number> \
              '{body: $body, path: $path, commit_id: $commit_id, line: $line}' \
            | gh api repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/comments --input -

            Rules:
            - jq output MUST be a JSON object {}, never an array []
            - Only post findings whose line numbers appear in the PR diff
            - If a finding references a line outside the diff, include it in the summary comment instead
            - Preserve severity tags (Critical / Important / Suggestion)
            - Skip duplicate or near-duplicate findings
            - Always post a summary comment at the end (even if inline comments were posted):
              jq -n --arg body "<summary>" '{body: $body}' \
              | gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments --input -
