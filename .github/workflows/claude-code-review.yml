name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get changed files
        id: changed
        run: |
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path')
          if [ -z "$FILES" ]; then
            echo "::error::No changed files found for PR #${{ github.event.pull_request.number }}"
            exit 1
          fi
          echo "files<<CHANGED_FILES_EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "CHANGED_FILES_EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-plugins-official.git'
          plugins: 'pr-review-toolkit@claude-plugins-official'
          prompt: |
            Review ONLY the files changed in this PR.
            Changed files:
            ${{ steps.changed.outputs.files }}

            Use /pr-review-toolkit:review-pr to review these changed files only.

      - name: Extract review text
        if: always() && steps.review.outputs.execution_file != ''
        id: extract
        run: |
          REVIEW_TEXT=$(jq -r '
            [.[] | select(.type == "assistant") | .message.content[]
             | select(.type == "text") | .text] | join("\n\n---\n\n")
          ' "${{ steps.review.outputs.execution_file }}")

          if [ -z "$REVIEW_TEXT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "review_text<<REVIEW_TEXT_EOF" >> "$GITHUB_OUTPUT"
            echo "$REVIEW_TEXT" >> "$GITHUB_OUTPUT"
            echo "REVIEW_TEXT_EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comments
        if: >-
          always()
          && steps.extract.outcome == 'success'
          && steps.extract.outputs.skip != 'true'
          && steps.review.outputs.execution_file != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--model claude-haiku-4-5 --max-turns 10'
          settings: '{"permissions":{"allow":["Bash(gh api:*)"]}}'
          show_full_output: 'true'

          prompt: |-
            You are a review comment posting agent. The following is
            a code review of PR #${{ github.event.pull_request.number }}.

            <review>
            ${{ steps.extract.outputs.review_text }}
            </review>

            For each review finding that references a specific file path and line number,
            post it as an inline PR review comment using:

            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              --field body="<comment body>" \
              --field path="<file path>" \
              --field commit_id="${{ github.event.pull_request.head.sha }}" \
              --field line=<line number>

            Rules:
            - Only post findings with specific file paths and line numbers
            - Preserve severity tags (Critical / Important / Suggestion)
            - Skip duplicate or near-duplicate findings
            - If no actionable findings exist, post a single summary comment instead using:
              gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
                --field body="<summary>"
