<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__TITLE_PLACEHOLDER__ — preview</title>
<script src="/marked.min.js"></script>
<style>
  :root {
    --accent: #2c7be5;
    --highlight: #fff3a3;
    --highlight-edge: #d4a017;
    --highlight-pending: #e8f4ff;
    --highlight-pending-edge: #2c7be5;
    --finding-edge: #ff7f50; /* coral — distinct from yellow drag-comment highlight */
    --muted: #666;
    --bg: #fafafa;
    --sidebar-width: 320px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
    margin: 0;
    padding: 0;
    line-height: 1.7;
    color: #222;
    background: white;
  }

  /* Layout — main content + right sidebar */
  #layout {
    display: flex;
    min-height: 100vh;
  }
  #main {
    flex: 1;
    min-width: 0;
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5em 1.5em 5em;
  }
  header {
    border-bottom: 1px solid #eee;
    padding-bottom: 1em;
    margin-bottom: 2em;
    color: var(--muted);
    font-size: .9em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header a { color: var(--accent); text-decoration: none; }
  header a:hover { text-decoration: underline; }
  #content { font-size: 17px; }
  #content h1 { font-size: 2em; margin-top: 1.5em; }
  #content h2 { font-size: 1.5em; margin-top: 1.4em; }
  #content h3 { font-size: 1.2em; margin-top: 1.2em; }
  #content blockquote {
    border-left: 3px solid #ddd;
    padding-left: 1em;
    color: #555;
    margin: 1em 0;
  }
  #content code {
    background: #f3f3f3;
    padding: .1em .35em;
    border-radius: 3px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: .92em;
  }
  #content pre {
    background: #f3f3f3;
    padding: 1em;
    border-radius: 4px;
    overflow-x: auto;
  }
  #content pre code { background: transparent; padding: 0; }
  #content table {
    border-collapse: collapse;
    margin: 1em 0;
  }
  #content th, #content td {
    border: 1px solid #ddd;
    padding: .4em .7em;
  }
  #content th { background: #f7f7f7; }

  /* Annotated text — saved marks */
  .annotated {
    background: var(--highlight);
    border-bottom: 2px solid var(--highlight-edge);
    padding: 1px 0;
    cursor: help;
    transition: box-shadow .25s ease;
  }
  .annotated::after {
    content: "💬";
    font-size: .65em;
    margin-left: 2px;
    vertical-align: super;
  }

  /* Pending mark — view-state only, while popup is open during compose */
  .annotated-pending {
    background: var(--highlight-pending);
    border-bottom: 2px dashed var(--highlight-pending-edge);
    padding: 1px 0;
  }
  .annotated-pending::after { content: ""; margin: 0; }

  /* Click-to-focus pulse on body mark */
  .annotated.pulse {
    box-shadow: 0 0 0 4px rgba(44, 123, 229, .35);
  }

  /* Finding-anchor — TaskList-backed scan finding anchored in source markdown.
     Uses an additive coral underline that may overlap the yellow drag-comment
     highlight without obscuring it (border-bottom layer below the drag mark). */
  .finding-anchor {
    border-bottom: 2px solid var(--finding-edge);
    padding: 1px 0;
    cursor: help;
    transition: box-shadow .25s ease;
  }
  .finding-anchor.pulse {
    box-shadow: 0 0 0 4px rgba(255, 127, 80, .35);
  }
  /* When a span is both a drag comment and a finding anchor, both visual cues
     stack: drag yellow + 💬 (existing), plus the coral border-bottom (this rule).
     border-bottom of nested marks both render because each <mark> is its own box. */

  /* Popup */
  #popup {
    position: absolute;
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
    padding: .8em;
    z-index: 1000;
    width: 340px;
    display: none;
  }
  #popup.show { display: block; }
  #popup-anchor-preview {
    font-size: .85em;
    color: var(--muted);
    margin-bottom: .5em;
    padding: .4em .5em;
    background: var(--bg);
    border-left: 3px solid var(--highlight-edge);
    border-radius: 3px;
    max-height: 4.5em;
    overflow: hidden;
    line-height: 1.4;
  }
  #popup textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: .5em;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
  }
  #popup textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  #popup-actions {
    display: flex;
    gap: .5em;
    align-items: center;
    margin-top: .5em;
  }
  #popup-cancel { margin-left: auto; }
  #popup button.danger {
    background: #c0392b;
    color: white;
    border-color: #c0392b;
  }
  #popup button.danger:hover { background: #e74c3c; border-color: #e74c3c; }
  #popup-delete { display: none; }
  #popup.edit-mode #popup-delete { display: inline-block; }
  #popup button {
    padding: .4em .9em;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: white;
    cursor: pointer;
    font-size: .9em;
  }
  #popup button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  #popup button:hover { filter: brightness(.95); }
  #popup-hint {
    font-size: .75em;
    color: var(--muted);
    margin-top: .35em;
    text-align: right;
  }

  /* Sidebar — right panel listing all comments */
  #sidebar {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 2.4em; /* clear status bar */
    width: var(--sidebar-width);
    background: var(--bg);
    border-left: 1px solid #eee;
    transform: translateX(100%);
    transition: transform .2s ease;
    z-index: 400;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body.sidebar-open #sidebar { transform: translateX(0); }
  /* HTML mode: no sidepanel / scan finding-flow — review is in-place anchored commenting. */
  body.cr-html-mode #sidebar, body.cr-html-mode #status-count { display: none; }
  /* HTML renders at the authored viewport: drop the 760px reading-width box + all #main padding,
     and hide the top nav chrome (it pushed the artifact down and broke 100vh / top-aligned /
     fixed layouts). Full-page 100vh / fixed-position fidelity is still bounded by Shadow-DOM
     rendering — a sandboxed iframe (see Deferred hardening) would give a true nested viewport;
     the bottom status pill remains a minimal fixed overlay. */
  body.cr-html-mode #main { max-width: none; padding: 0; }
  body.cr-html-mode header { display: none; }
  /* HTML artifacts are authored against the browser default (white page, dark text), not the
     review app's OS-driven dark theme. Force a light base for the rendered artifact regardless of
     prefers-color-scheme, so a transparent-bodied page shows white (not the dark canvas) and
     inherited text stays dark and readable. The body element is dropped by the Shadow-DOM fragment
     injection, so the artifact's own body colors do not apply; a light base makes the fallback
     match the browser default. (Pages that style body/html explicitly still need the deferred
     iframe rendering for full fidelity.) */
  body.cr-html-mode { background: #fff; color: #1a2233; }
  #sidebar-header {
    padding: .75em 1em;
    border-bottom: 1px solid #eee;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: .9em;
    color: var(--muted);
  }
  #sidebar-header strong { color: #222; }
  #sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: .5em 0;
  }
  #findings-list {
    max-height: 40%;
    overflow-y: auto;
    min-height: 0;
  }
  #sidebar-empty {
    padding: 2em 1em;
    color: var(--muted);
    font-size: .85em;
    text-align: center;
    font-style: italic;
  }
  .sidebar-item {
    padding: .65em 1em;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: background .12s ease;
  }
  .sidebar-item:hover { background: #f0f4f8; }
  .sidebar-item-anchor {
    font-size: .82em;
    color: #444;
    border-left: 3px solid var(--highlight-edge);
    padding-left: .55em;
    margin-bottom: .35em;
    line-height: 1.35;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .sidebar-item-comment {
    font-size: .9em;
    color: #222;
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  /* Findings section — TaskList-backed scan findings, distinct from comments.
     Same toggle-with-sidebar behavior; sub-section header separates findings
     from drag-comments inside the same panel. */
  .sidebar-section-header {
    padding: .55em 1em;
    background: white;
    border-bottom: 1px solid #eee;
    font-size: .78em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-section-header .count-pill {
    background: #eee;
    color: #444;
    padding: .1em .55em;
    border-radius: 10px;
    font-weight: 600;
    font-size: .9em;
  }
  .finding-item .sidebar-item-anchor {
    border-left-color: var(--finding-edge);
  }
  .finding-item-meta {
    font-size: .78em;
    color: #444;
    margin-top: .25em;
    display: flex;
    gap: .55em;
    align-items: center;
  }
  .finding-item-meta .tag {
    color: #b04020;
    font-weight: 500;
  }
  .finding-item.unanchored .sidebar-item-anchor {
    border-left-style: dashed;
    color: var(--muted);
    font-style: italic;
  }
  /* Sidebar findings and in-text coral anchors both open the response popup. */
  .finding-item, .finding-anchor { cursor: pointer; }
  /* Finding-response popup body section (shown only in finding-mode).
     Anchor preview is hidden in finding-mode — body section already carries
     the full finding context (subject + body), so the duplicate anchor line
     would only add visual noise. */
  #popup-finding-body {
    display: none;
    padding: .5em .65em;
    margin-bottom: .4em;
    max-height: 18em;
    overflow-y: auto;
    font-size: .9em;
    color: #222;
    border-left: 3px solid var(--finding-edge);
    line-height: 1.45;
    white-space: pre-wrap;
  }
  #popup.finding-mode #popup-finding-body { display: block; }
  #popup.finding-mode #popup-anchor-preview { display: none; }
  #popup.finding-mode #popup-delete { display: none !important; }
  #popup.finding-mode #popup-copy { display: none !important; }
  #findings-empty {
    padding: 1.2em 1em;
    color: var(--muted);
    font-size: .82em;
    text-align: center;
    font-style: italic;
  }

  /* Status bar */
  #status {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid #eee;
    padding: .55em 1.5em;
    font-size: .85em;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 500;
  }
  #status-conn::before {
    content: "●";
    color: #52c41a;
    margin-right: .35em;
  }
  #status-conn.disconnected::before { color: #aaa; }
  #status-count {
    background: transparent;
    border: none;
    padding: .15em .55em;
    margin: -.15em -.55em;
    border-radius: 4px;
    color: inherit;
    font: inherit;
    cursor: pointer;
    transition: background .12s ease;
  }
  #status-count:hover { background: rgba(44, 123, 229, .1); color: #222; }
  body.sidebar-open #status-count { background: rgba(44, 123, 229, .14); color: #222; }
  #status-count strong { color: #222; }

  /* Toast — confirms each submit silently append to disk, since popup close alone is ambiguous */
  #toast {
    position: fixed;
    bottom: 3.2em;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #222;
    color: white;
    padding: .5em 1em;
    border-radius: 20px;
    font-size: .85em;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease, transform .18s ease;
    z-index: 1500;
    box-shadow: 0 4px 14px rgba(0,0,0,.2);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #toast.error { background: #c0392b; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e0e0e0; }
    header { border-bottom-color: #333; color: #888; }
    #content blockquote { border-left-color: #444; color: #aaa; }
    #content code, #content pre { background: #2a2a2a; }
    #content th, #content td { border-color: #333; }
    #content th { background: #252525; }
    .annotated { background: #5a4a00; color: #fff; }
    .annotated-pending { background: #1f3550; color: #fff; }
    #popup { background: #222; border-color: #444; }
    #popup-anchor-preview { background: #2a2a2a; color: #aaa; }
    #popup textarea { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    #popup button { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
    #popup-finding-body { color: #e0e0e0; }
    #status { background: #1a1a1a; border-top-color: #333; }
    #status-count strong { color: #e0e0e0; }
    #status-count:hover { background: rgba(255,255,255,.06); color: #e0e0e0; }
    body.sidebar-open #status-count { background: rgba(255,255,255,.1); color: #e0e0e0; }
    #sidebar { background: #1f1f1f; border-left-color: #333; }
    #sidebar-header { background: #1a1a1a; border-bottom-color: #333; }
    #sidebar-header strong { color: #e0e0e0; }
    .sidebar-item { border-bottom-color: #333; }
    .sidebar-item:hover { background: #2a2a2a; }
    .sidebar-item-anchor { color: #aaa; }
    .sidebar-item-comment { color: #e0e0e0; }
    .sidebar-section-header { background: #1a1a1a; border-bottom-color: #333; color: #888; }
    .sidebar-section-header .count-pill { background: #2a2a2a; color: #ccc; }
    .finding-item-meta { color: #aaa; }
    .finding-item-meta .tag { color: #ffb094; }
    #findings-empty { color: #888; }
  }

</style>
</head>
<body>

<div id="layout">
  <div id="main">
    <header>
      <span><a href="/">← all drafts</a></span>
      <span><strong>__TITLE_PLACEHOLDER__</strong></span>
    </header>

    <div id="content"></div>
  </div>
</div>

<aside id="sidebar" aria-label="Findings and comments panel">
  <div id="sidebar-header">
    <span><strong id="sidebar-count">0</strong> items</span>
    <span style="font-size:.78em;">click to focus</span>
  </div>
  <div class="sidebar-section-header">
    <span>Scan findings</span>
    <span class="count-pill" id="findings-count">0</span>
  </div>
  <div id="findings-list">
    <div id="findings-empty">No open findings — sidepanel populates after an apply + scan round.</div>
  </div>
  <div class="sidebar-section-header">
    <span>Drag comments</span>
    <span class="count-pill" id="comments-count">0</span>
  </div>
  <div id="sidebar-list">
    <div id="sidebar-empty">No comments yet — select text to add one.</div>
  </div>
</aside>

<div id="popup">
  <div id="popup-anchor-preview"></div>
  <div id="popup-finding-body"></div>
  <textarea id="popup-textarea" placeholder="Comment on this selection…"></textarea>
  <div id="popup-actions">
    <button id="popup-delete" class="danger" type="button" aria-label="Delete comment">Delete</button>
    <button id="popup-cancel">Cancel</button>
    <button id="popup-copy" type="button">Copy</button>
    <button id="popup-submit" class="primary">Submit</button>
  </div>
  <div id="popup-hint">⌘Enter to submit · Esc to cancel · click a 💬 mark to edit</div>
</div>

<div id="status">
  <span id="status-conn">live</span>
  <button id="status-count" type="button" aria-label="Toggle comment list" aria-controls="sidebar" aria-expanded="false">
    <strong id="count">0</strong> comments
  </button>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script type="application/json" id="md-source">__MARKDOWN_CONTENT_PLACEHOLDER__</script>
<script type="application/json" id="findings-data">__FINDINGS_PLACEHOLDER__</script>

<script>
const SLUG = __SLUG_PLACEHOLDER__;
// Render substrate: "markdown" → marked.parse into the light DOM; "html" → raw file
// served through an open Shadow DOM (CSS-isolated from this review chrome; scripts
// inserted via innerHTML are inert). Anchoring is text-selection in markdown mode,
// element-click → unique CSS selector in html mode.
const RENDER_MODE = __RENDER_MODE_PLACEHOLDER__;
// Findings: TaskList-backed scan findings injected by serve.ts at render time.
// Filtered to current slug (substring match on description tag) and excluding
// completed entries. Per-finding shape: { id, subject, description, status,
// anchor, subProtocol, round, body }. anchor/subProtocol/round are parsed from
// inline tags in description; body is the description with all tags stripped.
let FINDINGS = [];
try {
  FINDINGS = JSON.parse(document.getElementById("findings-data").textContent || "[]");
} catch (e) {
  console.error("[findings] failed to parse injected data:", e);
}

// Render the artifact. `root` is the query/anchor surface: the light-DOM #content in
// markdown mode, the shadow root in html mode.
// The body is transported as a JSON string (escapeForScriptTag-protected, same as the
// findings payload): JSON.parse reverses it losslessly — a real <\/script> in the artifact
// survives, and a literal <\/script> already present in the source is not corrupted. Used
// by both modes (marked.parse for markdown, shadowRoot.innerHTML for html).
const sourceText = JSON.parse(document.getElementById("md-source").textContent);
const content = document.getElementById("content");
let shadowRoot = null;
let root = content;
if (RENDER_MODE === "html") {
  // Raw HTML served through an open Shadow DOM: CSS-isolated from the review chrome,
  // selector-click works because it is the same document. innerHTML does not run script
  // elements, but this is NOT a JS sandbox — inline event handlers (onerror/onload), iframes,
  // and active subresources still execute/load in this same-origin page; review trusted
  // HTML only. marked is not used in html mode.
  shadowRoot = content.attachShadow({ mode: "open" });
  shadowRoot.innerHTML = sourceText;
  root = shadowRoot;
  // HTML review is in-place anchored commenting (right-click comment + edit-back); the
  // sub-protocol scan / sidepanel finding-flow is a markdown-mode feature, so hide the
  // sidepanel + its toggle (CSS below) and no-op the populate paths (renderFindings/renderSidebar).
  document.body.classList.add("cr-html-mode");
  // Mark/finding visuals must live inside the shadow root — the chrome's light-DOM
  // stylesheet does not pierce the boundary. Outline-based marks avoid re-flowing the
  // artifact (no <mark> wrapping); element-level anchoring marks the element in place.
  const shadowStyle = document.createElement("style");
  shadowStyle.textContent =
    ".cr-anno{outline:2px solid #d4a017;outline-offset:1px;cursor:help;}" +
    '.cr-anno::after{content:"💬";font-size:.7em;vertical-align:super;margin-left:2px;}' +
    ".cr-finding{outline:2px solid #ff7f50;outline-offset:1px;cursor:pointer;}" +
    // Hover-target hint: declared after cr-anno/cr-finding so it wins while hovering an
    // already-marked element; thin dashed blue is distinct from the solid mark outlines.
    ".cr-hover{outline:1px dashed #2c7be5;outline-offset:1px;cursor:context-menu;}" +
    ".cr-pulse{box-shadow:0 0 0 4px rgba(44,123,229,.45);}" +
    ".cr-finding-pulse{box-shadow:0 0 0 4px rgba(255,127,80,.45);}";
  shadowRoot.appendChild(shadowStyle);
} else {
  content.innerHTML = marked.parse(sourceText);
}
// Cache once — innerText forces layout reflow per access (expensive on long drafts).
// Only the markdown text-selection flow reads it; html mode anchors by selector.
const contentText = RENDER_MODE === "html" ? "" : content.innerText;

// Selection-popup state
const popup = document.getElementById("popup");
const popupPreview = document.getElementById("popup-anchor-preview");
const popupFindingBody = document.getElementById("popup-finding-body");
const popupTextarea = document.getElementById("popup-textarea");
const popupSubmit = document.getElementById("popup-submit");
const popupCancel = document.getElementById("popup-cancel");
const popupDelete = document.getElementById("popup-delete");
const countEl = document.getElementById("count");

// Sidebar state
const sidebar = document.getElementById("sidebar");
const sidebarList = document.getElementById("sidebar-list");
const sidebarEmpty = document.getElementById("sidebar-empty");
const sidebarCount = document.getElementById("sidebar-count");
const statusCount = document.getElementById("status-count");
const findingsList = document.getElementById("findings-list");
const findingsEmpty = document.getElementById("findings-empty");
const findingsCount = document.getElementById("findings-count");
const commentsCount = document.getElementById("comments-count");

// Per-finding mark refs: id -> array of <mark> elements (empty when anchor unresolved).
// Used to scroll-to-anchor when the user clicks a sidebar finding entry.
const findingMarks = new Map();

let pending = null; // { range, anchor, context_before, context_after, editingMark, tempMarks }
let markIdCounter = 0; // monotonic id assigned per saved mark group; bridges DOM <-> sidebar entry

let selSettle = null; // markdown-only selection-settle timer (cleared in dismissPopup)
// Declared before the html-mode init block (which assigns it) to avoid a temporal-dead-zone
// ReferenceError; the hover handlers below also read it.
let selectorChip = null;  // html mode: light-DOM chip showing the live CSS selector on hover
if (RENDER_MODE === "html") {
  // Element-level anchoring. Right-click (contextmenu) is the comment trigger so left-click
  // stays free for the page's own interactivity (links, buttons). A right-click inside the
  // shadow root sees the real target (events retarget to the host only after they cross the
  // boundary); the handler routes edit / finding-response / new-comment by the target's marks.
  root.addEventListener("contextmenu", handleContextMenu);
  // Hover preview: outline the element under the cursor + show its live CSS selector before
  // the user commits. The chip lives in the light DOM so the shadow boundary cannot clip it.
  selectorChip = document.createElement("div");
  selectorChip.id = "cr-selector-chip";
  selectorChip.style.cssText =
    "position:fixed;bottom:10px;left:10px;z-index:1400;max-width:60vw;padding:.3em .6em;" +
    "border-radius:4px;background:rgba(20,30,50,.92);color:#cfe3ff;font:12px ui-monospace,Menlo,monospace;" +
    "white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;display:none;" +
    "box-shadow:0 2px 8px rgba(0,0,0,.25);";
  document.body.appendChild(selectorChip);
  root.addEventListener("mouseover", handleHover);
  content.addEventListener("mouseleave", clearHover);
} else {
  content.addEventListener("mouseup", () => {
    // Let the selection settle before reading it
    setTimeout(handleSelection, 0);
  });

  // Touch devices: a long-press selection ends with `selectionchange`, not a clean
  // `mouseup`, so the popup never opened on mobile. Debounce so it opens only after
  // the selection settles (after the user finishes dragging the selection handles).
  // `selectionchange` fires on selection only (not on scroll), so mobile scrolling
  // stays unaffected; `handleSelection` ends by collapsing the range, which re-fires
  // `selectionchange` as collapsed and is ignored by handleSelection's own guard.
  document.addEventListener("selectionchange", () => {
    if (popup.classList.contains("show")) return; // a popup is already open
    clearTimeout(selSettle);
    selSettle = setTimeout(handleSelection, 450);
  });
}

function setPopupMode(isEdit) {
  popupSubmit.textContent = isEdit ? "Update" : "Submit";
  popup.classList.toggle("edit-mode", !!isEdit);
}

function positionPopupNear(rect) {
  const popupWidth = 340;
  const left = Math.min(window.scrollX + rect.left, window.scrollX + window.innerWidth - popupWidth - 16);
  popup.style.top = (window.scrollY + rect.bottom + 8) + "px";
  popup.style.left = Math.max(16, left) + "px";
}

function truncateForPopup(text) {
  if (!text) return "";
  return text.length > 200 ? text.slice(0, 200) + "…" : text;
}

// Common popup-opening tail shared by all three entry points (handleSelection,
// openEditPopup, openFindingPopup) — single point where mode toggles + show
// class + focus ordering are guaranteed consistent.
function showPopup({ rect, previewText, textareaValue, isEdit, isFinding, selectAfterFocus }) {
  positionPopupNear(rect);
  popupPreview.textContent = truncateForPopup(previewText);
  popupTextarea.value = textareaValue;
  setPopupMode(!!isEdit);
  popup.classList.toggle("finding-mode", !!isFinding);
  popup.classList.add("show");
  popupTextarea.focus();
  if (selectAfterFocus) popupTextarea.select();
}

// Wrap a range across element boundaries by walking its intersecting text nodes
// and wrapping each fragment individually. Returns an array of <mark> elements
// (one per text-node fragment). Used by both the pending (dashed) and save (yellow)
// flows so element-crossing selections produce a visible mark instead of silently
// failing at surroundContents.
function wrapRangeInMarks(range, className) {
  const startCont = range.startContainer;
  const endCont = range.endContainer;
  const startOffsetInitial = range.startOffset;
  const endOffsetInitial = range.endOffset;

  const ancestor = range.commonAncestorContainer;
  const root = ancestor.nodeType === Node.TEXT_NODE ? ancestor.parentNode : ancestor;
  if (!root) return [];

  // Snapshot text nodes intersecting the range BEFORE any DOM mutation, so the
  // walk is unaffected by subsequent splitText / wrap operations.
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  let n;
  while ((n = walker.nextNode())) {
    if (range.intersectsNode(n)) textNodes.push(n);
  }

  const marks = [];
  for (const textNode of textNodes) {
    let startOffset = 0;
    let endOffset = textNode.length;
    if (textNode === startCont) startOffset = startOffsetInitial;
    if (textNode === endCont) endOffset = endOffsetInitial;
    if (startOffset >= endOffset) continue;

    let target = textNode;
    if (startOffset > 0) {
      target = target.splitText(startOffset);
      endOffset -= startOffset;
    }
    if (endOffset < target.length) {
      target.splitText(endOffset);
    }

    const mark = document.createElement("mark");
    mark.className = className;
    target.parentNode.insertBefore(mark, target);
    mark.appendChild(target);
    marks.push(mark);
  }
  return marks;
}

// Apply pending dashed marks for an in-progress selection. Returns array of marks
// (possibly empty for degenerate ranges with no intersecting text nodes).
function applyPendingMarks(range) {
  try {
    return wrapRangeInMarks(range, "annotated-pending");
  } catch (e) {
    if (e instanceof DOMException) {
      // Genuine DOM constraint — popup-only flow remains usable
      console.warn("[applyPendingMarks] DOM constraint:", e.name, e.message);
      return [];
    }
    throw e; // unexpected — surface for investigation
  }
}

// Unwrap pending marks, restoring inline text. Safe to call with empty/null array.
function removePendingMarks(marks) {
  if (!marks || marks.length === 0) return;
  for (const mark of marks) {
    if (!mark.parentNode) continue;
    const parent = mark.parentNode;
    while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
    parent.removeChild(mark);
  }
  // Single normalize at the end is cheaper than per-mark when marks share parents
  content.normalize();
}

// Promote pending marks to saved annotations — all marks in the array share the
// same markId (logical comment identity for sidebar dedup) and server-issued id.
function promotePendingMarks(marks, anchor, context_before, context_after, comment, id) {
  const markId = String(++markIdCounter);
  for (const mark of marks) {
    mark.className = "annotated";
    mark.title = comment;
    mark.dataset.anchor = anchor;
    mark.dataset.contextBefore = context_before;
    mark.dataset.contextAfter = context_after;
    mark.dataset.comment = comment;
    mark.dataset.markId = markId;
    mark.dataset.id = id;
  }
}

function handleSelection() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const text = sel.toString().trim();
  if (text.length < 2) return;
  const range = sel.getRangeAt(0);
  if (!content.contains(range.commonAncestorContainer)) return;

  const idx = contentText.indexOf(text);
  const context_before = idx >= 0 ? contentText.slice(Math.max(0, idx - 60), idx).replace(/\s+/g, " ").trim() : "";
  const context_after = idx >= 0 ? contentText.slice(idx + text.length, idx + text.length + 60).replace(/\s+/g, " ").trim() : "";

  // Apply temp marks first; positioning uses the first mark's rect when wrap succeeds
  const liveRange = range.cloneRange();
  const tempMarks = applyPendingMarks(liveRange);

  pending = {
    range: liveRange,
    anchor: text,
    context_before,
    context_after,
    editingMark: null,
    tempMarks, // empty array for degenerate ranges; save flow handles both cases
  };

  const anchorRect = tempMarks.length > 0 ? tempMarks[0].getBoundingClientRect() : range.getBoundingClientRect();
  // Drop the live selection so the dashed pending mark is the only visible cue
  sel.removeAllRanges();
  showPopup({ rect: anchorRect, previewText: text, textareaValue: "" });
}

// Edit preserves append-only JSONL: resubmits with the same (anchor, context_before,
// context_after) tuple; the revision consumer applies latest-timestamp-wins dedup.
function openEditPopup(markEl) {
  pending = {
    range: null,
    anchor: markEl.dataset.anchor || markEl.textContent,
    context_before: markEl.dataset.contextBefore || "",
    context_after: markEl.dataset.contextAfter || "",
    editingMark: markEl,
    tempMarks: [],
  };
  showPopup({
    rect: markEl.getBoundingClientRect(),
    previewText: pending.anchor,
    textareaValue: markEl.dataset.comment || "",
    isEdit: true,
    selectAfterFocus: true,
  });
}

// Document-level findings have no in-text anchor — popup falls back to the
// right side of the viewport, just below the sidebar header.
function openFindingPopup(finding, anchorEl) {
  const anchorText = finding.anchor || "(document-level finding)";
  pending = {
    range: null,
    anchor: anchorText,
    context_before: "",
    context_after: "",
    editingMark: null,
    tempMarks: [],
    findingId: finding.id, // submit handler appends [task: <id>] to the comment
  };
  // In html mode a finding's anchor is a CSS selector — record it on the disposition line.
  if (RENDER_MODE === "html" && finding.anchor) {
    pending.anchor_kind = "selector";
    pending.selector = finding.anchor;
  }

  const rect = anchorEl && anchorEl.isConnected
    ? anchorEl.getBoundingClientRect()
    : { left: window.innerWidth - 380, bottom: 90, top: 50, right: window.innerWidth - 40, width: 340, height: 0 };

  const subject = finding.subject || "";
  const body = finding.body || "";
  popupFindingBody.textContent = subject && body ? subject + "\n\n" + body : (subject || body);
  popupTextarea.placeholder = "Respond to this finding (auto-tagged with [task: " + finding.id + "])…";
  showPopup({ rect, previewText: anchorText, textareaValue: "", isFinding: true });
}

// ── HTML mode: element-level anchoring (selector-based) ──
// All html-mode marks are in-place class toggles on the artifact's own elements,
// kept inside the shadow root; nothing wraps or re-flows the artifact.

let htmlMarkIdCounter = 0;
const htmlPulseSlot = { id: null };
let hoverEl = null;       // html mode: element currently outlined under the cursor
// selectorChip is declared earlier (before the html-mode init block) to avoid a TDZ error.

// CSS.escape with a conservative fallback for ids carrying special chars.
function cssEscape(s) {
  return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
}

// Compute a unique CSS selector for `el` within `r` (a shadow root or element).
// Prefers a unique #id; otherwise builds a tag:nth-of-type(n) child chain to the root.
function cssPath(el, r) {
  if (!el || el.nodeType !== Node.ELEMENT_NODE) return "";
  if (el.id && r.querySelectorAll("#" + cssEscape(el.id)).length === 1) return "#" + cssEscape(el.id);
  const parts = [];
  let cur = el;
  while (cur && cur.nodeType === Node.ELEMENT_NODE && cur !== r) {
    if (cur.id && r.querySelectorAll("#" + cssEscape(cur.id)).length === 1) {
      parts.unshift("#" + cssEscape(cur.id));
      break;
    }
    const tag = cur.tagName.toLowerCase();
    const parent = cur.parentNode;
    const sibs = parent ? Array.from(parent.children).filter((s) => s.tagName === cur.tagName) : [cur];
    parts.unshift(sibs.length > 1 ? tag + ":nth-of-type(" + (sibs.indexOf(cur) + 1) + ")" : tag);
    if (!parent || parent === r || parent.nodeType !== Node.ELEMENT_NODE) break;
    cur = parent;
  }
  return parts.join(" > ");
}

// Scroll an html-mode element into view and pulse it (clears stale pulses in the shadow root).
function pulseHtml(el, className) {
  if (!el || !el.isConnected) return;
  el.scrollIntoView({ behavior: "smooth", block: "center" });
  if (htmlPulseSlot.id) clearTimeout(htmlPulseSlot.id);
  root.querySelectorAll(".cr-pulse, .cr-finding-pulse").forEach((e) => e.classList.remove("cr-pulse", "cr-finding-pulse"));
  void el.offsetWidth;
  el.classList.add(className);
  htmlPulseSlot.id = setTimeout(() => el.classList.remove(className), 800);
}

// Mark an element as a saved comment anchor (outline + 💬), carrying the dataset the
// sidebar + edit/delete flows read.
function markHtmlElement(el, selector, comment, id) {
  if (!el) return;
  el.classList.add("cr-anno");
  el.dataset.anchor = selector;
  el.dataset.selector = selector;
  el.dataset.anchorKind = "selector";
  el.dataset.comment = comment;
  el.dataset.id = id || "";
  if (!el.dataset.markId) el.dataset.markId = "h" + (++htmlMarkIdCounter);
  el.title = comment;
}

// New-comment popup for a freshly clicked element; the selector is the anchor.
function openSelectorPopup(el, selector) {
  pending = {
    range: null,
    anchor: selector,
    anchor_kind: "selector",
    selector: selector,
    context_before: "",
    context_after: "",
    editingMark: null,
    tempMarks: [],
    selectorTarget: el, // element to mark on successful submit
  };
  showPopup({ rect: el.getBoundingClientRect(), previewText: selector, textareaValue: "" });
}

// Edit popup for an already-annotated html element.
function openEditPopupHtml(el) {
  const selector = el.dataset.selector || el.dataset.anchor || "";
  pending = {
    range: null,
    anchor: selector,
    anchor_kind: "selector",
    selector: selector,
    context_before: "",
    context_after: "",
    editingMark: el,
    tempMarks: [],
  };
  showPopup({
    rect: el.getBoundingClientRect(),
    previewText: selector,
    textareaValue: el.dataset.comment || "",
    isEdit: true,
    selectAfterFocus: true,
  });
}

// Shadow-root right-click router: suppress the native menu, then edit existing comment →
// respond to finding → new comment. Left-click is intentionally left free for the page.
function handleContextMenu(e) {
  e.preventDefault(); // suppress the native context menu — right-click is the comment trigger
  const target = e.target;
  if (!target || target.nodeType !== Node.ELEMENT_NODE) return;
  const annoEl = target.closest(".cr-anno");
  if (annoEl) {
    e.stopPropagation();
    openEditPopupHtml(annoEl);
    return;
  }
  const findingEl = target.closest("[data-finding-id]");
  if (findingEl && findingEl.dataset.findingId) {
    e.stopPropagation();
    const finding = FINDINGS.find((f) => f.id === findingEl.dataset.findingId);
    if (finding) openFindingPopup(finding, findingEl);
    return;
  }
  const selector = cssPath(target, root);
  if (!selector) return;
  e.stopPropagation();
  openSelectorPopup(target, selector);
}

// Hover preview (html mode): outline the element under the cursor and show its live selector.
function handleHover(e) {
  const t = e.target;
  if (!t || t.nodeType !== Node.ELEMENT_NODE || t === hoverEl) return;
  if (hoverEl) hoverEl.classList.remove("cr-hover");
  hoverEl = t;
  hoverEl.classList.add("cr-hover");
  if (selectorChip) {
    selectorChip.textContent = cssPath(t, root) || "(no selector)";
    selectorChip.style.display = "block";
  }
}

// Clear the hover outline + chip when the cursor leaves the artifact.
function clearHover() {
  if (hoverEl) hoverEl.classList.remove("cr-hover");
  hoverEl = null;
  if (selectorChip) selectorChip.style.display = "none";
}

content.addEventListener("click", (e) => {
  if (RENDER_MODE === "html") return; // html clicks are handled on the shadow root
  const mark = e.target.closest(".annotated");
  if (mark) {
    e.stopPropagation();
    openEditPopup(mark);
    return;
  }
  const findingMark = e.target.closest(".finding-anchor");
  if (findingMark && findingMark.dataset.findingId) {
    e.stopPropagation();
    const finding = FINDINGS.find((f) => f.id === findingMark.dataset.findingId);
    if (finding) openFindingPopup(finding, findingMark);
  }
});

function dismissPopup() {
  // Cancel any pending selection-settle timer explicitly. The removeAllRanges()
  // below also re-fires selectionchange (which clears selSettle), but clearing it
  // here makes the timer lifecycle self-documenting rather than implicit.
  clearTimeout(selSettle);
  // Clean up pending temp marks before clearing state
  if (pending && pending.tempMarks && pending.tempMarks.length > 0) {
    removePendingMarks(pending.tempMarks);
  }
  popup.classList.remove("show");
  popup.classList.remove("edit-mode");
  popup.classList.remove("finding-mode");
  popupTextarea.placeholder = "Comment on this selection…";
  pending = null;
  const sel = window.getSelection();
  if (sel) sel.removeAllRanges();
}

popupCancel.addEventListener("click", dismissPopup);
popupSubmit.addEventListener("click", submitFeedback);
popupDelete.addEventListener("click", deleteFeedback);
async function copyTextToClipboard(text) {
  // Secure context (https / localhost): use the async Clipboard API.
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
  }
  // Insecure context (http over LAN / tailnet IP): clipboard API is undefined,
  // fall back to the legacy execCommand path via a transient textarea.
  try {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.top = "-1000px";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch (e) { return false; }
}
document.getElementById("popup-copy").addEventListener("click", async () => {
  if (!(pending && pending.anchor)) return;
  const ok = await copyTextToClipboard(pending.anchor);
  const b = document.getElementById("popup-copy");
  const prev = b.textContent;
  b.textContent = ok ? "Copied" : "Failed";
  setTimeout(() => { b.textContent = prev; }, 1000);
});

popupTextarea.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    submitFeedback();
  } else if (e.key === "Escape") {
    e.preventDefault();
    e.stopPropagation(); // prevent document-level Esc handler from also firing
    dismissPopup();
  }
});

document.addEventListener("click", (e) => {
  if (!popup.contains(e.target) && !content.contains(e.target) && !sidebar.contains(e.target) && !statusCount.contains(e.target)) {
    dismissPopup();
  }
});

const toastEl = document.getElementById("toast");
let toastTimer = null;
function showToast(msg, isError) {
  toastEl.textContent = msg;
  toastEl.classList.toggle("error", !!isError);
  toastEl.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1800);
}

// Single-source fetch wrapper — all /feedback writes (POST + DELETE) share URL,
// headers, and JSON body shape. Per-site response/error handling stays at the call site.
function feedbackFetch(method, body) {
  return fetch("/feedback", {
    method,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
}

async function submitFeedback() {
  if (!pending) return dismissPopup();
  const comment = popupTextarea.value.trim();
  if (!comment) return dismissPopup();

  const captured = pending; // capture before dismiss

  // Edit case: send the original id so the new entry shares the dedup key with the
  // previous version. Create case: omit id so server mints a UUID.
  // Finding-response mode: append [task: <id>] tag so the apply step recognizes
  // this comment as a disposition signal against the named TaskList entry.
  const taggedComment = captured.findingId
    ? comment + " [task: " + captured.findingId + "]"
    : comment;

  const reqBody = {
    slug: SLUG,
    anchor: captured.anchor,
    context_before: captured.context_before,
    context_after: captured.context_after,
    comment: taggedComment,
  };
  // html mode carries the element selector as a tagged-union anchor (markdown omits both).
  if (captured.anchor_kind) reqBody.anchor_kind = captured.anchor_kind;
  if (captured.selector) reqBody.selector = captured.selector;
  if (captured.editingMark && captured.editingMark.dataset.id) {
    reqBody.id = captured.editingMark.dataset.id;
  }

  try {
    const resp = await feedbackFetch("POST", reqBody);
    if (!resp.ok) throw new Error("server " + resp.status);
    const result = await resp.json();
    const id = result.id;

    if (captured.editingMark) {
      if (RENDER_MODE === "html") {
        // html edit: the annotated element itself is the mark — update it in place.
        const el = captured.editingMark;
        el.dataset.comment = comment;
        el.title = comment;
        if (id) el.dataset.id = id;
      } else {
        // Update comment text on all marks in the same logical group
        const markId = captured.editingMark.dataset.markId;
        const marks = markId
          ? content.querySelectorAll('.annotated[data-mark-id="' + markId + '"]')
          : [captured.editingMark];
        for (const mark of marks) {
          mark.dataset.comment = comment;
          mark.title = comment;
          if (id) mark.dataset.id = id;
        }
      }
      showToast("✓ updated");
    } else if (RENDER_MODE === "html" && captured.selectorTarget) {
      // html new comment: mark the clicked element (outline + 💬) in place.
      markHtmlElement(captured.selectorTarget, captured.selector || captured.anchor, comment, id);
      captured.selectorTarget = null;
      showToast("✓ saved");
    } else if (captured.tempMarks && captured.tempMarks.length > 0 && captured.tempMarks[0].parentNode) {
      promotePendingMarks(captured.tempMarks, captured.anchor, captured.context_before, captured.context_after, comment, id);
      captured.tempMarks = []; // do not unwrap on dismiss
      showToast("✓ saved");
    } else {
      // Truly degenerate range — zero text nodes intersected. Comment is persisted
      // server-side; no DOM mark was created so editing/deleting via UI is unavailable.
      console.warn("[submitFeedback] no marks to promote; comment saved without visual mark.");
      showToast("✓ saved (no visual mark)");
    }
    dismissPopup();
    renderSidebar();
  } catch (e) {
    // Preserve comment text on failure (5xx, network error) so the user can retry — don't dismiss.
    showToast(`✗ save failed: ${e.message} — comment preserved, press ⌘Enter to retry`, true);
  }
}

async function deleteFeedback() {
  if (!pending || !pending.editingMark) {
    showToast("✗ delete unavailable", true);
    return;
  }
  const captured = pending;
  const editedMark = captured.editingMark;
  const id = editedMark.dataset.id;
  const markId = editedMark.dataset.markId;

  if (!id) {
    showToast("✗ delete unavailable (no id — pre-update mark)", true);
    return;
  }

  try {
    const resp = await feedbackFetch("DELETE", { slug: SLUG, id });
    if (!resp.ok) {
      let reason = "HTTP " + resp.status;
      try {
        const errBody = await resp.json();
        if (errBody && errBody.reason) reason = errBody.reason;
      } catch {
        // non-JSON body — keep HTTP status as reason
      }
      throw new Error(reason);
    }
    const result = await resp.json();
    if (!result.deleted) {
      throw new Error(result.reason || "server did not confirm deletion");
    }

    if (RENDER_MODE === "html") {
      // html: drop the annotation class + dataset, leaving the element itself intact.
      editedMark.classList.remove("cr-anno");
      delete editedMark.dataset.comment;
      delete editedMark.dataset.anchor;
      delete editedMark.dataset.selector;
      delete editedMark.dataset.anchorKind;
      delete editedMark.dataset.id;
      delete editedMark.dataset.markId;
      editedMark.removeAttribute("title");
    } else {
      // Unwrap ALL marks sharing the same markId — preserves multi-mark groups
      const marks = markId
        ? content.querySelectorAll('.annotated[data-mark-id="' + markId + '"]')
        : [editedMark];
      for (const mark of marks) {
        const parent = mark.parentNode;
        if (!parent) continue;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
      }
      content.normalize();
    }
    dismissPopup();
    renderSidebar();
    showToast("✓ deleted");
  } catch (e) {
    showToast("✗ delete failed: " + e.message, true);
  }
}

// ── Sidebar: findings + comments view + click-to-focus ──

// Locate an anchor span in the rendered content. Walks text nodes once, builds a
// flat string, finds the substring, then maps positions back to (node, offset)
// pairs to construct a Range. Returns null when the anchor cannot be resolved
// (text rewritten, anchor too short, or DOM does not span the requested length).
function locateAnchorInDOM(anchorText) {
  if (!anchorText || anchorText.length < 2) return null;
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  let combined = "";
  let n;
  while ((n = walker.nextNode())) {
    textNodes.push({ node: n, offset: combined.length, length: n.textContent.length });
    combined += n.textContent;
  }
  const idx = combined.indexOf(anchorText);
  if (idx < 0) return null;
  const endIdx = idx + anchorText.length;
  let startNode = null, startOffset = 0;
  let endNode = null, endOffset = 0;
  for (const tn of textNodes) {
    const nodeStart = tn.offset;
    const nodeEnd = tn.offset + tn.length;
    if (!startNode && idx >= nodeStart && idx <= nodeEnd) {
      startNode = tn.node;
      startOffset = idx - nodeStart;
    }
    if (endIdx > nodeStart && endIdx <= nodeEnd) {
      endNode = tn.node;
      endOffset = endIdx - nodeStart;
      break;
    }
  }
  if (!startNode || !endNode) return null;
  const range = document.createRange();
  try {
    range.setStart(startNode, startOffset);
    range.setEnd(endNode, endOffset);
  } catch {
    return null;
  }
  return range;
}

// Truncate body text for sidebar display while preserving readability.
function truncateForDisplay(text, maxChars) {
  if (!text) return "";
  const compact = text.replace(/\s+/g, " ").trim();
  if (compact.length <= maxChars) return compact;
  return compact.slice(0, maxChars - 1) + "…";
}

// Render findings sidebar: anchored findings get a .finding-anchor in-text mark
// (clickable scroll-to-anchor); unanchored findings render with dashed-border
// styling (no in-text mark, no scroll target).
function renderFindings() {
  if (RENDER_MODE === "html") return; // html mode suppresses the scan finding-flow (no sidepanel, no in-place finding marks)
  while (findingsList.firstChild) findingsList.removeChild(findingsList.firstChild);
  findingMarks.clear();

  if (!Array.isArray(FINDINGS) || FINDINGS.length === 0) {
    findingsCount.textContent = "0";
    findingsList.appendChild(findingsEmpty);
    return;
  }

  for (const finding of FINDINGS) {
    const anchorId = finding.anchorId || "";
    const anchorText = finding.anchor || "";
    let marks = [];

    if (RENDER_MODE === "html") {
      // html: the finding anchor is a CSS selector resolved inside the shadow root.
      // The element is marked in place (coral outline); no wrapping span.
      if (anchorText) {
        let el = null;
        try { el = root.querySelector(anchorText); } catch (e) { el = null; }
        if (el) {
          el.classList.add("cr-finding");
          marks = [el];
        }
      }
    } else {
      // Preferred path: UUID-based DOM lookup. The source markdown carries
      // <span id="cr-anchor-{UUID}" class="finding-anchor">…</span> so the span
      // is already the marked element; no substring search, no ambiguity.
      if (anchorId) {
        const el = document.getElementById("cr-anchor-" + anchorId);
        if (el) marks = [el];
      }

      // Fallback: substring search + wrap, for findings without anchor-id
      // (legacy or AI declined to assign UUID).
      if (marks.length === 0 && anchorText) {
        const range = locateAnchorInDOM(anchorText);
        if (range) {
          try {
            marks = wrapRangeInMarks(range, "finding-anchor");
          } catch (e) {
            console.warn("[findings] wrap failed for finding", finding.id, e);
            marks = [];
          }
        }
      }
    }
    // Tag the marked elements with the finding id so content-click handlers
    // can reverse-lookup the finding from a clicked .finding-anchor span.
    for (const m of marks) m.dataset.findingId = finding.id;
    findingMarks.set(finding.id, marks);

    const item = document.createElement("div");
    item.className = "sidebar-item finding-item " + (marks.length > 0 ? "anchored" : "unanchored");
    item.setAttribute("role", "button");

    const anchorEl = document.createElement("div");
    anchorEl.className = "sidebar-item-anchor";
    anchorEl.textContent = anchorText
      ? truncateForDisplay(anchorText, 120)
      : "Document-level finding";

    const bodyEl = document.createElement("div");
    bodyEl.className = "sidebar-item-comment";
    bodyEl.textContent = truncateForDisplay(finding.body || finding.subject || "", 200);

    const metaEl = document.createElement("div");
    metaEl.className = "finding-item-meta";
    if (finding.subProtocol) {
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = "/" + finding.subProtocol;
      metaEl.appendChild(tag);
    }
    if (finding.round) {
      const round = document.createElement("span");
      round.textContent = "round " + finding.round;
      metaEl.appendChild(round);
    }

    item.appendChild(anchorEl);
    item.appendChild(bodyEl);
    if (metaEl.childNodes.length > 0) item.appendChild(metaEl);

    // Both sidebar surfaces (findings + drag-comments) follow the same
    // scroll-then-popup pattern so click semantics are uniform.
    item.setAttribute("tabindex", "0");
    const openResponse = () => {
      if (marks.length > 0) focusFindingMarks(marks);
      openFindingPopup(finding, marks.length > 0 ? marks[0] : null);
    };
    item.addEventListener("click", openResponse);
    item.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openResponse();
      }
    });
    findingsList.appendChild(item);
  }

  findingsCount.textContent = String(FINDINGS.length);
}

// Shared pulse: scroll first mark into view, clear stale .pulse, force reflow,
// re-add .pulse, schedule removal. timerSlot.id is the per-class debounce handle.
function pulseMarks(marks, className, timerSlot) {
  if (!marks || marks.length === 0) return;
  const first = marks[0];
  if (!first.isConnected) return;
  first.scrollIntoView({ behavior: "smooth", block: "center" });
  document.querySelectorAll("." + className + ".pulse").forEach((el) => el.classList.remove("pulse"));
  if (timerSlot.id) clearTimeout(timerSlot.id);
  void first.offsetWidth;
  marks.forEach((m) => m.classList.add("pulse"));
  timerSlot.id = setTimeout(() => {
    marks.forEach((m) => m.classList.remove("pulse"));
  }, 800);
}

const findingPulseSlot = { id: null };
function focusFindingMarks(marks) {
  if (!marks || marks.length === 0) return;
  if (RENDER_MODE === "html") {
    pulseHtml(marks[0], "cr-finding-pulse");
    return;
  }
  pulseMarks(marks, "finding-anchor", findingPulseSlot);
}

function updateTotalSidebarCount(commentsN) {
  const findingsN = Array.isArray(FINDINGS) ? FINDINGS.length : 0;
  const total = findingsN + commentsN;
  sidebarCount.textContent = String(total);
  countEl.textContent = String(total);
}

function renderSidebar() {
  // The sidebar is markdown-mode only — html mode hides it and surfaces comments in-place
  // (the .cr-anno outline + 💬 on the element itself, applied by markHtmlElement on submit).
  if (RENDER_MODE === "html") return;
  const allMarks = content.querySelectorAll(".annotated");
  // Group by markId so multi-mark logical comments collapse to one sidebar row.
  // First-seen mark per group is the canonical scroll/focus target.
  const groups = new Map();
  for (const mark of allMarks) {
    if (!mark.dataset.markId) mark.dataset.markId = String(++markIdCounter);
    if (!groups.has(mark.dataset.markId)) groups.set(mark.dataset.markId, mark);
  }

  const n = groups.size;
  commentsCount.textContent = String(n);
  updateTotalSidebarCount(n);

  // Clear list (preserve sidebarEmpty node by removing all children then conditionally re-adding)
  while (sidebarList.firstChild) sidebarList.removeChild(sidebarList.firstChild);

  if (n === 0) {
    sidebarList.appendChild(sidebarEmpty);
    return;
  }

  for (const mark of groups.values()) {
    const item = document.createElement("div");
    item.className = "sidebar-item";
    item.setAttribute("role", "button");
    item.setAttribute("tabindex", "0");

    const anchorEl = document.createElement("div");
    anchorEl.className = "sidebar-item-anchor";
    const anchorText = mark.dataset.anchor || mark.textContent || "";
    anchorEl.textContent = anchorText;

    const commentEl = document.createElement("div");
    commentEl.className = "sidebar-item-comment";
    commentEl.textContent = mark.dataset.comment || "";

    item.appendChild(anchorEl);
    item.appendChild(commentEl);
    // html comments carry a CSS-selector anchor — edit through the selector-aware popup so
    // the resubmit preserves anchor_kind/selector (markdown openEditPopup would drop both,
    // downgrading the latest JSONL entry to text-mode and breaking selector apply-back).
    const openEdit = () => { focusMark(mark); (RENDER_MODE === "html" ? openEditPopupHtml : openEditPopup)(mark); };
    item.addEventListener("click", openEdit);
    item.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openEdit();
      }
    });
    sidebarList.appendChild(item);
  }
}

const commentPulseSlot = { id: null };
function focusMark(mark) {
  if (!mark || !mark.isConnected) return;
  // Clean orphaned pending marks before refocusing — popup may be open with a draft
  // that the user is abandoning by clicking a sidebar item
  if (pending && pending.tempMarks && pending.tempMarks.length > 0) {
    removePendingMarks(pending.tempMarks);
    pending.tempMarks = [];
  }
  if (RENDER_MODE === "html") {
    // html comments are single in-place elements — pulse the element directly.
    pulseHtml(mark, "cr-pulse");
    return;
  }
  // Pulse all marks in the same logical group (multi-mark comments span multiple elements)
  const markId = mark.dataset.markId;
  const groupMarks = markId
    ? Array.from(document.querySelectorAll('.annotated[data-mark-id="' + markId + '"]'))
    : [mark];
  pulseMarks(groupMarks, "annotated", commentPulseSlot);
}

statusCount.addEventListener("click", () => {
  const opened = document.body.classList.toggle("sidebar-open");
  statusCount.setAttribute("aria-expanded", opened ? "true" : "false");
});

// Document-level Esc: dismiss popup if open, otherwise close sidebar.
// Popup textarea handler runs first and stopPropagation prevents this from firing
// when the textarea has focus.
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (popup.classList.contains("show")) {
    dismissPopup();
  } else if (document.body.classList.contains("sidebar-open")) {
    document.body.classList.remove("sidebar-open");
    statusCount.setAttribute("aria-expanded", "false");
  }
});

// renderFindings must run before renderSidebar so .finding-anchor marks exist
// when the sidebar walk reads .annotated.
renderFindings();
renderSidebar();
if (Array.isArray(FINDINGS) && FINDINGS.length > 0) {
  document.body.classList.add("sidebar-open");
  statusCount.setAttribute("aria-expanded", "true");
}

// WebSocket hot reload
function connectWS() {
  const conn = document.getElementById("status-conn");
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    conn.classList.remove("disconnected");
    conn.textContent = "live";
  };
  ws.onclose = () => {
    conn.classList.add("disconnected");
    conn.textContent = "reconnecting…";
    setTimeout(connectWS, 2000);
  };
  ws.onerror = (e) => {
    // Surface handshake / protocol errors instead of swallowing them into the infinite reconnect loop.
    conn.classList.add("disconnected");
    conn.textContent = "ws error";
    console.error("[ws] error:", e);
    // onclose fires next and triggers the reconnect timer; no manual action needed here.
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.slug === SLUG) {
        sessionStorage.setItem("scrollY", String(window.scrollY));
        location.reload();
      }
    } catch {
      // ignore non-JSON frames
    }
  };
}
connectWS();

// Restore scroll on reload
const savedScroll = sessionStorage.getItem("scrollY");
if (savedScroll) {
  window.scrollTo(0, parseInt(savedScroll, 10));
  sessionStorage.removeItem("scrollY");
}
</script>
